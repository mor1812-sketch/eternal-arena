name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Inject Firebase config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          escape_sed_replacement() {
            printf '%s' "$1" | sed -e 's/[\\|&/]/\\&/g'
          }

          sed -i "s|FIREBASE_API_KEY|$(escape_sed_replacement "$FIREBASE_API_KEY")|g" firebase-config.js
          sed -i "s|FIREBASE_AUTH_DOMAIN|$(escape_sed_replacement "$FIREBASE_AUTH_DOMAIN")|g" firebase-config.js
          sed -i "s|FIREBASE_PROJECT_ID|$(escape_sed_replacement "$FIREBASE_PROJECT_ID")|g" firebase-config.js
          sed -i "s|FIREBASE_STORAGE_BUCKET|$(escape_sed_replacement "$FIREBASE_STORAGE_BUCKET")|g" firebase-config.js
          sed -i "s|FIREBASE_MESSAGING_SENDER_ID|$(escape_sed_replacement "$FIREBASE_MESSAGING_SENDER_ID")|g" firebase-config.js
          sed -i "s|FIREBASE_APP_ID|$(escape_sed_replacement "$FIREBASE_APP_ID")|g" firebase-config.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          enable_jekyll: false